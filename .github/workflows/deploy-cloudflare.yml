# Cloudflare Pages 部署（国内访问通常比 github.io 更友好）
# 首次使用：在 GitHub 仓库 Settings → Secrets 添加：
#   CLOUDFLARE_API_TOKEN  （Cloudflare 控制台 → My Profile → API Tokens → Edit Cloudflare Workers → Pages:Edit）
#   CLOUDFLARE_ACCOUNT_ID （Cloudflare 控制台右侧 Account ID）
name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: pdf-word-helper
          directory: .
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
